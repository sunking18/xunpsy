<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f5f0eb;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .logo-3{
    width:420px;height:420px;border-radius:50%;background:#2D4A42;
    display:flex;align-items:center;justify-content:center;
    position:relative;box-shadow:0 12px 48px rgba(45,74,66,0.25)
  }
  .logo-3::before{
    content:'';position:absolute;top:24px;left:24px;right:24px;bottom:24px;
    border-radius:50%;border:3px solid #6B9E8A;opacity:0.4
  }
  .logo-3::after{
    content:'';position:absolute;top:42px;left:42px;right:42px;bottom:42px;
    border-radius:50%;border:1.5px solid #D4A574;opacity:0.3
  }
  .logo-3 .inner-content{
    display:flex;flex-direction:column;align-items:center;gap:20px
  }
  .logo-3 .arc-text{
    font-family:'Songti SC','STSong','SimSun',serif;
    font-size:18px;color:#97C459;letter-spacing:6px
  }
  .logo-3 img{width:105px;height:105px;object-fit:contain}
  .logo-3 .name{font-family:'Songti SC','STSong','SimSun',serif;font-size:57px;font-weight:900;color:#FFFBF5;letter-spacing:12px}
  .logo-3 .en{font-family:Georgia,serif;font-size:22px;color:#D4A574;font-style:italic;letter-spacing:6px}
</style></head>
<body>
<div class="logo-3">
  <div class="inner-content">
    <div class="arc-text">向内寻 · 向外生</div>
    <img src="logo-white.png" alt="寻心理">
    <div class="name">寻心理</div>
    <div class="en">InnerSeed</div>
  </div>
</div>
</body>
</html>
