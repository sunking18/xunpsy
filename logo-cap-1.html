<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f5f0eb;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .logo-1{
    width:420px;height:420px;border-radius:50%;background:#FFFBF5;border:6px solid #4A7C6F;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;box-shadow:0 12px 48px rgba(45,74,66,0.12)
  }
  .logo-1::before{
    content:'';position:absolute;top:12px;left:12px;right:12px;bottom:12px;
    border-radius:50%;border:3px dashed #D4A574;opacity:0.5
  }
  .logo-1 img{width:135px;height:135px;object-fit:contain;margin-bottom:12px}
  .logo-1 .name{font-family:'Songti SC','STSong','SimSun',serif;font-size:48px;font-weight:900;color:#2D4A42;letter-spacing:9px}
  .logo-1 .en{font-family:Georgia,serif;font-size:22px;color:#4A7C6F;font-style:italic;letter-spacing:6px;margin:8px 0}
  .logo-1 .tagline{font-family:'Songti SC','STSong','SimSun',serif;font-size:18px;color:#6B5E52;letter-spacing:6px;margin-top:6px}
</style></head>
<body>
<div class="logo-1">
  <img src="logo.png" alt="寻心理">
  <div class="name">寻心理</div>
  <div class="en">InnerSeed</div>
  <div class="tagline">向内寻 · 向外生</div>
</div>
</body>
</html>
