<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f5f0eb;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .logo-2{
    width:420px;height:420px;border-radius:36px;background:#2D4A42;
    display:flex;align-items:center;justify-content:center;gap:24px;padding:0 36px;
    box-shadow:0 12px 48px rgba(45,74,66,0.25)
  }
  .logo-2 img{width:150px;height:150px;object-fit:contain}
  .logo-2 .text-group{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;width:195px}
  .logo-2 .name{font-family:'Songti SC','STSong','SimSun',serif;font-size:54px;font-weight:900;color:#FFFBF5;letter-spacing:9px;line-height:1;white-space:nowrap}
  .logo-2 .en{font-family:Georgia,serif;font-size:22px;color:#D4A574;font-style:italic;letter-spacing:6px;margin:8px 0;white-space:nowrap}
  .logo-2 .divider{width:70px;height:2px;background:#D4A574;opacity:0.5;margin:6px 0}
  .logo-2 .tagline-wrap{display:flex;justify-content:flex-start;width:100%}
  .logo-2 .tagline{font-family:'Songti SC','STSong','SimSun',serif;font-size:20px;color:#97C459;letter-spacing:4px;white-space:nowrap}
</style></head>
<body>
<div class="logo-2">
  <img src="logo-white.png" alt="寻心理">
  <div class="text-group">
    <div class="name">寻心理</div>
    <div class="en">InnerSeed</div>
    <div class="divider"></div>
    <div class="tagline-wrap"><div class="tagline">向内寻 · 向外生</div></div>
  </div>
</div>
</body>
</html>
